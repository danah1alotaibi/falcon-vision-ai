<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falcon Vision AI</title>

  <style>
    body{
      margin:0;
      background:#050816;
      color:white;
      font-family:Arial,sans-serif;
    }

    .dashboard{
      min-height:100vh;
      padding:25px;
      box-sizing:border-box;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:#00eaff;
    }

    .main{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:25px;
      margin-top:25px;
    }

    .camera-box{
      height:480px;
      border:2px solid #00eaff;
      border-radius:18px;
      background:#07111f;
      box-shadow:0 0 25px rgba(0,234,255,0.4);
      position:relative;
      overflow:hidden;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    .rec{
      position:absolute;
      top:15px;
      left:20px;
      color:red;
      font-weight:bold;
      z-index:5;
      animation:blink 1s infinite;
    }

    @keyframes blink{
      50%{ opacity:0.3; }
    }

    .scan-line{
      position:absolute;
      width:100%;
      height:4px;
      background:#00ffcc;
      top:0;
      z-index:5;
      box-shadow:0 0 20px #00ffcc;
      animation:scan 4s linear infinite;
    }

    @keyframes scan{
      0%{ top:0; }
      100%{ top:100%; }
    }

    .target-box{
      position:absolute;
      width:120px;
      height:120px;
      border:3px solid red;
      top:45%;
      left:45%;
      z-index:5;
      box-shadow:0 0 20px red;
      animation:targetPulse 1.5s infinite;
    }

    @keyframes targetPulse{
      50%{
        transform:scale(1.1);
        opacity:0.7;
      }
    }

    .coords{
      position:absolute;
      bottom:15px;
      left:20px;
      color:#00ffcc;
      z-index:5;
      font-size:14px;
    }

    .ai-alert{
      position:absolute;
      top:20px;
      right:20px;
      z-index:6;
      background:rgba(255,0,0,0.25);
      border:1px solid red;
      color:white;
      padding:12px 18px;
      border-radius:12px;
      font-size:14px;
      display:none;
      box-shadow:0 0 20px red;
    }

    .side-panel{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .card{
      background:#0b1224;
      border:1px solid #1e90ff;
      border-radius:15px;
      padding:18px;
      box-shadow:0 0 15px rgba(0,234,255,0.15);
    }

    .card h3{
      margin-top:0;
      color:#00eaff;
    }

    .value{
      font-size:28px;
      color:#00ff99;
    }

    .detection{
      background:#150b0b;
      border:1px solid red;
      box-shadow:0 0 20px rgba(255,0,0,0.25);
    }

    .detection h3{
      color:#ff3355;
    }

    .detect-text{
      color:#ffcc00;
      font-size:16px;
      line-height:26px;
    }

    .controls{
      margin-top:25px;
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    button{
      padding:14px 25px;
      border:none;
      border-radius:30px;
      background:#00eaff;
      color:#050816;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      box-shadow:0 0 20px #00eaff;
    }

    .danger{
      background:#ff3355;
      color:white;
    }

    .toggle-btn{
      background:#00ff99;
      margin-top:10px;
    }

    .toggle-btn:hover{
      box-shadow:0 0 20px #00ff99;
    }

    .radar{
      display:none;
      margin-top:10px;
      width:260px;
      height:260px;
      border-radius:50%;
      border:2px solid #00ff99;
      position:relative;
      overflow:hidden;
      align-self:center;
      background:rgba(0,255,100,0.05);
      box-shadow:0 0 25px rgba(0,255,100,0.3);
    }

    .radar::before{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      border-radius:50%;
      border:1px solid rgba(0,255,100,0.2);
      transform:scale(0.7);
    }

    .radar::after{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      border-radius:50%;
      border:1px solid rgba(0,255,100,0.15);
      transform:scale(0.4);
    }

    .sweep{
      position:absolute;
      width:50%;
      height:2px;
      background:#00ff99;
      top:50%;
      left:50%;
      transform-origin:left center;
      animation:rotate 2s linear infinite;
      box-shadow:0 0 20px #00ff99;
    }

    @keyframes rotate{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }

    .dot{
      position:absolute;
      width:10px;
      height:10px;
      background:red;
      border-radius:50%;
      top:35%;
      left:60%;
      box-shadow:0 0 15px red;
    }

    .map-card{
      display:none;
      background:#0b1224;
      border:1px solid #00eaff;
      border-radius:15px;
      padding:18px;
      box-shadow:0 0 15px rgba(0,234,255,0.15);
    }

    .map-card h3{
      margin-top:0;
      color:#00eaff;
    }

    .real-map{
      width:100%;
      height:220px;
      border:1px solid #00ff99;
      border-radius:12px;
    }

    .gps-text{
      color:#00ffcc;
      font-size:12px;
    }
  </style>
</head>

<body>

  <div class="dashboard">

    <div class="top-bar">
      <h1>Falcon Vision AI</h1>
      <p id="status">STATUS: STANDBY</p>
    </div>

    <div class="main">

      <div class="camera-box">

        <div class="rec">● REC</div>
        <div class="scan-line"></div>
        <div class="target-box"></div>

        <div class="ai-alert" id="aiAlert">
          TARGET LOCKED
        </div>

        <div class="coords">
          LAT: 24.7136<br>
          LON: 46.6753
        </div>

        <iframe
          src="https://www.youtube.com/embed/1La4QzGeaaQ?autoplay=1&mute=1&loop=1&playlist=1La4QzGeaaQ"
          allow="autoplay"
          allowfullscreen>
        </iframe>

      </div>

      <div class="side-panel">

        <div class="card">
          <h3>Battery</h3>
          <div class="value" id="battery">87%</div>
        </div>

        <div class="card">
          <h3>Altitude</h3>
          <div class="value" id="altitude">12 m</div>
        </div>

        <div class="card">
          <h3>Signal</h3>
          <div class="value">Strong</div>
        </div>

        <div class="card">
          <h3>AI Vision</h3>
          <div class="value" id="aiStatus">Online</div>
        </div>

        <div class="card detection">
          <h3>AI Detection</h3>
          <div class="detect-text" id="detectionText">
            SYSTEM READY<br>
            WAITING FOR TARGET...
          </div>
        </div>

        <button class="toggle-btn" onclick="toggleRadar()">
          Open / Close Radar
        </button>

        <div class="radar" id="radar">
          <div class="sweep"></div>
          <div class="dot"></div>
        </div>

        <button class="toggle-btn" onclick="toggleMap()">
          Open / Close GPS Map
        </button>

        <div class="map-card" id="mapCard">

          <h3>Live GPS Map</h3>

          <iframe
            class="real-map"
            src="https://www.openstreetmap.org/export/embed.html?bbox=46.6653%2C24.7036%2C46.6853%2C24.7236&layer=mapnik&marker=24.7136%2C46.6753">
          </iframe>

          <p class="gps-text">
            LAT: 24.7136 | LON: 46.6753
          </p>

        </div>

      </div>

    </div>

    <div class="controls">
      <button onclick="connectDrone()">Connect Drone</button>
      <button onclick="startCamera()">Start Camera</button>
      <button onclick="activateAI()">Activate AI Vision</button>
      <button class="danger" onclick="emergencyStop()">Emergency Stop</button>
    </div>

  </div>

  <script>
    function toggleMap(){
      const map=document.getElementById("mapCard");

      if(map.style.display==="none" || map.style.display===""){
        map.style.display="block";
      }else{
        map.style.display="none";
      }
    }

    function toggleRadar(){
      const radar=document.getElementById("radar");

      if(radar.style.display==="none" || radar.style.display===""){
        radar.style.display="block";
      }else{
        radar.style.display="none";
      }
    }

    function connectDrone(){
      document.getElementById("status").innerText = "STATUS: DRONE CONNECTED";
      document.getElementById("altitude").innerText = "18 m";
    }

    function startCamera(){
      document.getElementById("status").innerText = "STATUS: CAMERA STREAMING";
    }

    function activateAI(){
      document.getElementById("aiStatus").innerText = "Scanning";
      document.getElementById("aiAlert").style.display = "block";

      document.getElementById("detectionText").innerHTML =
        "PERSON DETECTED<br>TARGET LOCKED<br>TRACKING ACTIVE";

      setTimeout(function(){
        document.getElementById("aiStatus").innerText = "Online";
      }, 2000);
    }

    function emergencyStop(){
      document.getElementById("status").innerText = "STATUS: EMERGENCY STOP";
      document.getElementById("altitude").innerText = "0 m";
      document.getElementById("aiStatus").innerText = "Offline";
      document.getElementById("aiAlert").style.display = "none";

      document.getElementById("detectionText").innerHTML =
        "SYSTEM STOPPED<br>ALL TRACKING DISABLED";
    }
  </script>

</body>
</html>
