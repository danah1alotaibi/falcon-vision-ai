<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falcon Vision AI</title>

  <style>

    body{
      margin:0;
      height:100vh;
      background:#050816;
      overflow:hidden;
      font-family:Arial;
      color:white;
    }

    .background-grid{
      position:absolute;
      width:100%;
      height:100%;
      background-image:
      linear-gradient(rgba(0,255,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.07) 1px, transparent 1px);

      background-size:50px 50px;
    }

    .hero{
      position:relative;
      z-index:2;

      height:100vh;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      text-align:center;
    }

    h1{
      font-size:70px;
      margin:0;
      color:#00eaff;

      text-shadow:0 0 20px #00eaff;
    }

    p{
      margin-top:15px;
      font-size:22px;
      color:#9fb3ff;
    }

    button{
      margin-top:30px;
      padding:16px 40px;

      border:none;
      border-radius:40px;

      background:#00eaff;
      color:#050816;

      font-size:18px;
      cursor:pointer;

      transition:0.3s;
    }

    button:hover{
      transform:scale(1.08);
      box-shadow:0 0 25px #00eaff;
    }

    .status{
      position:absolute;
      top:30px;
      left:30px;

      color:#00ff99;

      font-size:14px;
      line-height:30px;
    }

  </style>
</head>

<body>

  <div class="background-grid"></div>

  <div class="status">
    <div>● CAMERA ONLINE</div>
    <div>● AI LINK ACTIVE</div>
    <div>● DRONE READY</div>
  </div>

  <section class="hero">

    <h1>Falcon Vision AI</h1>

    <p>Smart Drone Camera Control System</p>

    <button onclick="connectDrone()">
      Connect Drone
    </button>

  </section>

  <script>

    function connectDrone(){

      alert("Drone connection simulation started");

    }

  </script>

</body>
</html>
