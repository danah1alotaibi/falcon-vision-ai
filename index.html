<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falcon Vision AI</title>
  <style>
    body {
      margin: 0;
      background: #050816;
      color: white;
      font-family: Arial, sans-serif;
    }

    .dashboard {
      min-height: 100vh;
      padding: 25px;
      box-sizing: border-box;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #00eaff;
    }

    .main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 25px;
      margin-top: 25px;
    }

    .camera-box {
      height: 480px;
      border: 2px solid #00eaff;
      border-radius: 18px;
      background: linear-gradient(135deg, #07111f, #0b1f33);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 25px rgba(0,234,255,0.4);
      position: relative;
      overflow: hidden;
    }

    .camera-box::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .camera-text {
      z-index: 2;
      text-align: center;
      color: #00eaff;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card {
      background: #0b1224;
      border: 1px solid #1e90ff;
      border-radius: 15px;
      padding: 18px;
      box-shadow: 0 0 15px rgba(0,234,255,0.15);
    }

    .card h3 {
      margin-top: 0;
      color: #00eaff;
    }

    .value {
      font-size: 28px;
      color: #00ff99;
    }

    .controls {
      margin-top: 25px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 25px;
      border: none;
      border-radius: 30px;
      background: #00eaff;
      color: #050816;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      box-shadow: 0 0 20px #00eaff;
    }

    .danger {
      background: #ff3355;
      color: white;
    }
  </style>
</head>

<body>

  <div class="dashboard">

    <div class="top-bar">
      <h1>Falcon Vision AI</h1>
      <p id="connection">STATUS: STANDBY</p>
    </div>

    <div class="main">

     <div class="camera-box">

  <video autoplay muted loop playsinline width="100%" height="100%">

    <source src="https://cdn.coverr.co/videos/coverr-flying-over-mountains-1560081593551?download=1080p" type="video/mp4">

  </video>

</div>

      <div class="side-panel">

        <div class="card">
          <h3>Battery</h3>
          <div class="value" id="battery">87%</div>
        </div>

        <div class="card">
          <h3>Altitude</h3>
          <div class="value" id="altitude">0 m</div>
        </div>

        <div class="card">
          <h3>Signal</h3>
          <div class="value">Strong</div>
        </div>

        <div class="card">
          <h3>AI Vision</h3>
          <div class="value" id="ai">Offline</div>
        </div>

      </div>

    </div>

    <div class="controls">
      <button onclick="connectDrone()">Connect Drone</button>
      <button onclick="startCamera()">Start Camera</button>
      <button onclick="activateAI()">Activate AI Vision</button>
      <button class="danger" onclick="emergencyStop()">Emergency Stop</button>
    </div>

  </div>

  <script>
    function connectDrone() {
      document.getElementById("connection").innerText = "STATUS: DRONE CONNECTED";
      document.getElementById("altitude").innerText = "12 m";
    }

    function startCamera() {
      alert("Camera feed simulation started");
    }

    function activateAI() {
      document.getElementById("ai").innerText = "Online";
    }

    function emergencyStop() {
      document.getElementById("connection").innerText = "STATUS: EMERGENCY STOP";
      document.getElementById("altitude").innerText = "0 m";
    }
  </script>

</body>
</html>
